services:
  - type: web
    name: cv-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python init_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /all-data
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cv-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: PYTHON_VERSION
        value: 3.12.3

  - type: web
    name: cv-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false

databases:
  - name: cv-db
    plan: free
    databaseName: app
    user: user
